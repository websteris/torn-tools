name: Node.js Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HAS_API_KEY: ${{ secrets.TORN_API_KEY != '' }}

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '18.x'
        
    - name: Install dependencies
      run: |
        npm ci
        cd server && npm ci
    
    - name: Create test config directory
      run: mkdir -p server/config
        
    - name: Set up test configuration with API key
      if: env.HAS_API_KEY == 'true'
      run: |
        echo "module.exports = { apiKeys: { test: '${{ secrets.TORN_API_KEY }}' }, testUser: { torn_id: 1 } };" > server/config/test-config.js
      
    - name: Set up mock test configuration
      if: env.HAS_API_KEY != 'true'
      run: |
        echo "module.exports = { apiKeys: { test: 'mock-api-key-for-unit-tests' }, testUser: { torn_id: 12345 } };" > server/config/test-config.js
      
    - name: Run all tests
      env:
        TORN_API_KEY: ${{ secrets.TORN_API_KEY }}
      run: npm test 
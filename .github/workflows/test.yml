name: Node.js Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        
    - name: Install dependencies
      run: |
        npm ci
        cd server && npm ci
        
    - name: Run all tests (with API tests)
      if: ${{ secrets.TORN_API_KEY != '' }}
      env:
        TORN_API_KEY: ${{ secrets.TORN_API_KEY }}
      run: npm test
      
    - name: Run non-API tests only
      if: ${{ secrets.TORN_API_KEY == '' }}
      run: cd server && npm run test:noapi 